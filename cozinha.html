<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 KDS - Cozinha Dona Baguete</title>
    <style>
        /* --- ESTILOS BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a; /* Deep Slate Blue */
            color: #f8fafc; /* Light Gray */
            padding: 0;
            min-height: 100vh;
        }
        
        /* --- NAV ADMIN --- */
        .admin-nav {
            background: #1e293b; /* Darker Slate */
            padding: 15px 20px;
            border-bottom: 3px solid #f59e0b; /* Laranja/Ouro */
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-btn {
            background: #334155;
            color: #f3f4f6;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none; 
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #475569; }
        .nav-btn.active { background: #f59e0b; color: #000; }
        .nav-btn.logout { background: #ef4444; margin-left: auto; }
        .nav-btn.logout:hover { background: #dc2626; }
        .nav-btn.login-fallback { display: none; margin-left: auto; } /* Inicialmente escondido */

        /* --- HEADER & LOADING --- */
        h1 {
            text-align: center;
            color: #f59e0b;
            padding: 20px;
            font-size: 2.5rem;
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


        /* --- COLUNAS KDS --- */
        .kds-container {
            display: flex;
            gap: 20px;
            padding: 0 20px 20px;
            overflow-x: auto;
            align-items: stretch; /* Garante que as colunas ocupem a altura total */
        }
        .kds-coluna {
            background: #1e293b;
            border-radius: 12px;
            min-width: 360px;
            width: 360px;
            padding: 15px;
            flex-shrink: 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .kds-coluna h2 {
            font-size: 1.4rem;
            color: #f8fafc;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 2px solid #334155;
            text-align: center;
        }
        .pedidos-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: calc(100vh - 180px); /* Ajusta a altura visível */
            overflow-y: auto;
            padding-right: 5px;
        }
        .pedidos-container::-webkit-scrollbar { display: none; } /* Oculta a barra de rolagem */

        /* --- CARD DO PEDIDO --- */
        .pedido-card {
            background: #2d3748; /* Darker Blue */
            border-radius: 10px;
            padding: 15px;
            border-left: 5px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .pedido-card.Pendente { border-left-color: #f59e0b; animation: pulseBorder 1.5s infinite; }
        .pedido-card.Em-Preparo { border-left-color: #10b981; }
        .pedido-card.Pronto { border-left-color: #3b82f6; }
        
        @keyframes pulseBorder { 0%, 100% { border-left-color: #f59e0b; } 50% { border-left-color: #f9d77f; } }

        .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pedido-cliente { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .pedido-hora { font-size: 0.9rem; color: #a0aec0; }
        
        .pedido-itens ul { list-style: none; padding: 0; margin-bottom: 15px; border-top: 1px dashed #4b5563; padding-top: 10px; }
        .pedido-itens li { padding: 5px 0; border-bottom: 1px dashed #4b5563; }
        .item-detalhes { font-size: 0.8rem; color: #cbd5e1; padding-left: 10px; margin-top: 2px; }
        
        .pedido-info { background: #1e293b; border-radius: 6px; padding: 10px; margin: 10px 0; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; }
        .info-row span:first-child { color: #9ca3af; }
        .info-row span:last-child { color: #e5e7eb; font-weight: 500; }
        .info-row.total { font-size: 1.1rem; border-top: 1px solid #4b5563; padding-top: 8px; margin-top: 8px; }
        .info-row.total span:last-child { color: #f59e0b; font-weight: bold; }
        
        /* --- AÇÕES/BOTÕES --- */
        .pedido-acoes { display: flex; gap: 8px; margin-top: 15px; align-items: center; }
        .btn-kds {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-kds.preparo { background: #f59e0b; color: #000; flex: 1; }
        .btn-kds.pronto { background: #10b981; color: #fff; flex: 1; }
        .btn-kds.finalizar { background: #3b82f6; color: #fff; flex: 1; }
        .btn-kds.btn-print { background: #4a5568; color: #fff; font-size: 1.2rem; padding: 8px 12px; flex-grow: 0; }
        .btn-kds.btn-print:hover { background: #606b7c; }

        /* --- ESTILOS DE IMPRESSÃO --- */
        @media print {
            body { background: #fff; color: #000; padding: 0; }
            .admin-nav, .kds-container, h1 { display: none !important; }
            .print-area { display: block; width: 300px; margin: 0 auto; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.3; }
            .print-area * { color: #000 !important; background: none !important; box-shadow: none !important; border-color: #000 !important; }
            .print-area h1 { font-size: 16px; text-align: center; margin-bottom: 10px; }
            .print-area .info-row { border-bottom: 1px dashed #000; padding: 3px 0; }
            .print-area .info-row.total { font-size: 14px; font-weight: bold; }
            .print-area .pedido-itens ul { margin-top: 10px; }
            .print-area .item-detalhes { font-size: 10px; padding-left: 0; }
            
            /* Garante que o conteúdo de impressão seja isolado */
            #print-content {
                display: block !important;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                z-index: 9999;
            }
        }
    </style>
</head>
<body>

    <div class="admin-nav">
        <a href="cozinha.html" class="nav-btn active">🍳 Cozinha (KDS)</a>
        <a href="manual.html" class="nav-btn">✍️ Pedido Manual</a>
        <a href="caixa.html" class="nav-btn">📊 Caixa (Relatório)</a>
        <a href="admin.html" class="nav-btn">⚙️ Admin (Limpeza)</a>
        <a href="cardapio.html" class="nav-btn">📖 Cardápio</a> 
        <a href="login.html" class="nav-btn login-fallback" id="login-nav-btn">Entrar (Admin) ➔</a>
        <button id="logout-btn" class="nav-btn logout" style="display:none;">Sair ➔</button>
    </div>
    <audio id="audio-novo-pedido" src="https://www.myinstants.com/media/sounds/notification-sound.mp3" preload="auto"></audio>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p id="loading-message">Verificando autenticação...</p>
    </div>

    <h1>🖥️ KDS - Dona Baguete</h1>

    <div class="kds-container" id="kds-main-content" style="display:none;">
        <div class="kds-coluna">
            <h2 style="color: #f59e0b;">🔔 Novos Pedidos</h2>
            <div class="pedidos-container" id="container-Pendente">
                <p style="color:#a0aec0; text-align:center; padding: 20px;">Aguardando pedidos...</p>
            </div>
        </div>

        <div class="kds-coluna">
            <h2 style="color: #10b981;">🍳 Em Preparo</h2>
            <div class="pedidos-container" id="container-Em Preparo">
                <p style="color:#a0aec0; text-align:center; padding: 20px;">Aguardando pedidos...</p>
            </div>
        </div>

        <div class="kds-coluna">
            <h2 style="color: #3b82f6;">✅ Prontos (Entrega/Retirada)</h2>
            <div class="pedidos-container" id="container-Pronto">
                <p style="color:#a0aec0; text-align:center; padding: 20px;">Aguardando pedidos...</p>
            </div>
        </div>
    </div>
    
    <div id="print-content" style="display:none;"></div>


    <script type="module">
        // ==========================================================
        // FIREBASE MODULAR V9+ IMPORTS (necessário usar type="module")
        // ==========================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onChildChanged, onChildRemoved, update, remove, get, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";


        // Sua configuração do Firebase (VERIFIQUE SUA CHAVE)
        const firebaseConfig = {
            apiKey: "AIzaSyAQTm3cL26REQloN8AFP28gwsIUzYz73og",
            authDomain: "dona-baguete-kds.firebaseapp.com",
            databaseURL: "https://dona-baguete-kds-default-rtdb.firebaseio.com",
            projectId: "dona-baguete-kds",
            storageBucket: "dona-baguete-kds.firebasestorage.app",
            messagingSenderId: "307283406823",
            appId: "1:307283406823:web:a7d1761f0b4550cae59742",
            measurementId: "G-NY4NTLFLCG"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        const pedidosRef = ref(database, 'pedidos'); // Ponto raiz dos pedidos em aberto
        const historicoRef = ref(database, 'pedidos_concluidos');


        // --- UTILS E UI CONTROLS ---
        
        const loadingOverlay = document.getElementById('loading-overlay');
        const kdsMainContent = document.getElementById('kds-main-content');
        const loadingMessage = document.getElementById('loading-message');
        const logoutBtn = document.getElementById('logout-btn');
        const loginNavBtn = document.getElementById('login-nav-btn');
        const audioNovoPedido = document.getElementById('audio-novo-pedido');

        function tocarNotificacao() {
            audioNovoPedido.currentTime = 0; 
            audioNovoPedido.play().catch(e => console.warn("Não foi possível tocar o som (autoplay block):", e));
        }

        function cleanPhoneNumber(whatsapp) {
            // Remove +55, parênteses e traços. Assume que o código do país é 55.
            return whatsapp.replace(/\D/g, '').replace(/^55/, ''); 
        }

        // CORREÇÃO APLICADA AQUI (impressão)
        function buildPrintHTML(pedido) {
            const horaFormatada = new Date(pedido.hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            // Reutiliza formatarItens (definida logo abaixo)
            const itensList = formatarItens(pedido.itens).replace(/<ul>/g, '').replace(/<\/ul>/g, '');
            const itensParaImpressao = itensList.replace(/<li>/g, '<p>').replace(/<\/li>/g, '</p>').replace(/class="item-detalhes"/g, 'style="margin-left: 10px;"');

            return `
                <html><head><title>Comanda Dona Baguete</title>
                <style>
                    body { width: 280px; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.3; padding: 10px; color: #000; }
                    h1 { font-size: 16px; text-align: center; margin-bottom: 5px; }
                    h2 { font-size: 14px; border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 5px 0; margin: 10px 0; text-align: center; }
                    .info-line { display: flex; justify-content: space-between; border-bottom: 1px dotted #ccc; padding: 2px 0; }
                    .total { font-size: 14px; font-weight: bold; border-top: 1px solid #000; margin-top: 15px; padding-top: 5px; }
                </style>
                </head>
                <body>
                    <h1>Dona Baguete - Cozinha</h1>
                    <div style="text-align: center; margin-bottom: 10px;">Comanda para: **${pedido.cliente.nome}**</div>
                    
                    <div class="info-line"><span>Hora:</span> <span>${horaFormatada}</span></div>
                    <div class="info-line"><span>Cliente:</span> <span>${pedido.cliente.nome}</span></div>
                    <div class="info-line"><span>Telefone:</span> <span>${pedido.cliente.whatsapp}</span></div>
                    <div class="info-line"><span>Pagamento:</span> <span>${pedido.pagamento}</span></div>

                    <p style="margin-top: 10px;"><strong>Entrega:</strong> ${pedido.entrega.tipo === 'retirada' ? 'RETIRADA NO LOCAL' : pedido.entrega.endereco}</p>

                    <h2>ITENS</h2>
                    ${itensParaImpressao}
                    
                    <div class="info-line total"><span>TOTAL:</span> <span>R$ ${pedido.total.toFixed(2).replace('.', ',')}</span></div>
                    <p style="text-align: center; margin-top: 20px;">*** OBRIGADO! ***</p>
                </body>
                </html>
            `;
        }

        // --- FUNÇÕES DE RENDERIZAÇÃO E HTML ---

        function formatarItens(itens) {
            if (!itens) return '';
            return '<ul>' + itens.map(item => {
                let detalhes = '';
                if (item.queijo) detalhes += `<div class="item-detalhes">🧀 Queijo: ${item.queijo}</div>`;
                if (item.sabor) detalhes += `<div class="item-detalhes">🥤 Sabor: ${item.sabor}</div>`;
                if (item.adicionais && item.adicionais.length > 0) {
                    detalhes += `<div class="item-detalhes">➕ ${item.adicionais.map(ad => ad.nome).join(', ')}</div>`;
                }
                if (item.remocoes && item.remocoes.length > 0) {
                    detalhes += `<div class="item-detalhes">➖ ${item.remocoes.map(rem => rem.nome).join(', ')}</div>`;
                }
                if (item.observacao) {
                    detalhes += `<div class="item-detalhes">📝 Obs: ${item.observacao}</div>`;
                }
                return `<li><strong>${item.quantidade}x ${item.nome}</strong>${detalhes}</li>`;
            }).join('') + '</ul>';
        }

        function formatarAcoes(pedidoId, status) {
            let printBtn = `<button class="btn-kds btn-print" data-id="${pedidoId}">🖨️</button>`;
            
            if (status === 'Pendente') {
                return printBtn + `<button class="btn-kds preparo" data-id="${pedidoId}" data-status="Em Preparo">Mover para Preparo 🍳</button>`;
            }
            if (status === 'Em Preparo') {
                return printBtn + `<button class="btn-kds pronto" data-id="${pedidoId}" data-status="Pronto">Mover para Pronto ✅</button>`;
            }
            if (status === 'Pronto') {
                return printBtn + `<button class="btn-kds finalizar" data-id="${pedidoId}">Finalizar Pedido 🗑️</button>`;
            }
            return printBtn;
        }

        // CORREÇÃO APLICADA AQUI (card)
        function renderizarPedido(pedido, pedidoId, ehNovo = false) {
            
            const horaFormatada = new Date(pedido.hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const statusClass = pedido.status.replace(/\s/g, '-');
            
            const cardHTML = `
                <div class="pedido-card ${statusClass} ${ehNovo ? 'novo' : ''}" 
                             id="${pedidoId}" 
                             data-cliente-nome="${pedido.cliente.nome}" 
                             data-cliente-wa="${cleanPhoneNumber(pedido.cliente.whatsapp)}"
                             data-entrega-tipo="${pedido.entrega.tipo}">
                    
                    <div class="pedido-header">
                        <span class="pedido-cliente">${pedido.cliente.nome}</span>
                        <span class="pedido-hora">${horaFormatada}</span>
                    </div>
                    <div class="pedido-itens">
                        ${formatarItens(pedido.itens)}
                    </div>
                    
                    <div class="pedido-info">
                        <div class="info-row">
                            <span>📞 WhatsApp:</span>
                            <span>${pedido.cliente.whatsapp}</span>
                        </div>
                        <div class="info-row">
                            <span>📍 Entrega:</span>
                            <span>${pedido.entrega.tipo === 'retirada' ? 'Retirada' : pedido.entrega.endereco}</span>
                        </div>
                        <div class="info-row">
                            <span>💳 Pagamento:</span>
                            <span>${pedido.pagamento}</span>
                        </div>
                        <div class="info-row total">
                            <span>TOTAL:</span>
                            <span>R$ ${pedido.total.toFixed(2).replace('.', ',')}</span>
                        </div>
                    </div>
                    
                    <div class="pedido-acoes">
                        ${formatarAcoes(pedidoId, pedido.status)}
                    </div>
                </div>
            `;

            const cardAntigo = document.getElementById(pedidoId);
            if (cardAntigo) cardAntigo.remove();

            const containerId = `container-${pedido.status}`;
            const container = document.getElementById(containerId);
            
            if (container) {
                // Remove o "Aguardando pedidos..." da coluna vazia se houver
                container.querySelector('p')?.remove();
                container.insertAdjacentHTML('afterbegin', cardHTML);
            }
        }
        
        // --- FUNÇÕES DE AÇÃO FIREBASE ---

        function moverPedido(pedidoId, novoStatus) {
            const pedidoParaAtualizar = ref(database, 'pedidos/' + pedidoId);
            update(pedidoParaAtualizar, {
                status: novoStatus,
                horaStatus: new Date().toISOString()
            }).catch(error => {
                console.error("Erro ao mover pedido (WRITE FAILED).", error);
                alert("ERRO: Não foi possível mover o pedido. Verifique as regras de escrita do Firebase.");
            });
        }
        
        function finalizarPedido(pedidoId) {
            if (confirm('Tem certeza que deseja finalizar e ARQUIVAR este pedido?')) {
                const pedidoParaRemoverRef = ref(database, 'pedidos/' + pedidoId);
                
                get(pedidoParaRemoverRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const pedidoData = snapshot.val();
                        const destinoRef = ref(database, 'pedidos_concluidos/' + pedidoId);
                        
                        set(destinoRef, { 
                            ...pedidoData,
                            status: 'Concluído',
                            horaConclusao: new Date().toISOString()
                        }).then(() => {
                            remove(pedidoParaRemoverRef);
                        }).catch((error) => {
                            console.error("Erro ao MOVER o pedido (escrita no histórico): ", error);
                            alert("Erro ao arquivar o pedido.");
                        });
                    }
                }).catch((error) => {
                    console.error("Erro ao MOVER o pedido (leitura): ", error);
                    alert("Erro ao ler o pedido para arquivar.");
                });
            }
        }

        async function handlePrint(pedidoId) {
            const pedidoParaImprimirRef = ref(database, 'pedidos/' + pedidoId);
            try {
                const snapshot = await get(pedidoParaImprimirRef);
                if (!snapshot.exists()) {
                    alert("Erro: Pedido não encontrado para impressão.");
                    return;
                }
                const pedido = snapshot.val();
                
                const printHTML = buildPrintHTML(pedido);
                
                // Abre em uma nova janela temporária para impressão
                const printWindow = window.open('', '_blank', 'width=320,height=600');
                if (!printWindow || printWindow.closed || typeof printWindow.closed == 'undefined') {
                    alert("O navegador BLOQUEOU a impressão. Desative o bloqueador de pop-ups e tente novamente.");
                    return;
                }
                
                printWindow.document.write(printHTML);
                printWindow.document.close();
                
                // Garante que o conteúdo seja carregado antes de imprimir
                setTimeout(() => {
                    printWindow.print();
                    setTimeout(() => printWindow.close(), 10); // Fecha rápido
                }, 100); 

            } catch (error) {
                console.error("Erro ao buscar pedido para impressão:", error);
                alert("Erro ao gerar comanda.");
            }
        }

        // --- INICIALIZAÇÃO KDS ---
        
        function initKDSListeners() {
            loadingMessage.textContent = "Carregando pedidos em tempo real...";
            
            // 1. Oculta o loading e mostra o KDS principal
            loadingOverlay.style.display = 'none';
            kdsMainContent.style.display = 'flex';
            
            // 2. LISTENERS DE SINCRONIZAÇÃO
            onChildAdded(pedidosRef, (snapshot) => {
                const pedido = snapshot.val();
                const pedidoId = snapshot.key;
                
                // Remove o placeholder se um pedido chegar
                const container = document.getElementById(`container-${pedido.status}`);
                if (container) container.querySelector('p')?.remove();
                
                if(pedido.status === 'Pendente') {
                    tocarNotificacao();
                    renderizarPedido(pedido, pedidoId, true);
                } else {
                    renderizarPedido(pedido, pedidoId, false);
                }
            });

            onChildChanged(pedidosRef, (snapshot) => {
                const pedido = snapshot.val();
                const pedidoId = snapshot.key;
                renderizarPedido(pedido, pedidoId, false);
            });

            onChildRemoved(pedidosRef, (snapshot) => {
                const pedidoId = snapshot.key;
                const card = document.getElementById(pedidoId);
                if (card) {
                    // Após a remoção, verifica se a coluna ficou vazia e recoloca o placeholder
                    const container = card.parentElement;
                    card.remove();
                    if (container.children.length === 0) {
                       container.innerHTML = '<p style="color:#a0aec0; text-align:center; padding: 20px;">Aguardando pedidos...</p>';
                    }
                }
            });
        }
        
        // --- CONTROLE DE AUTENTICAÇÃO ---

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Logado: Esconde login, mostra logout e inicia o KDS
                loginNavBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                initKDSListeners();
            } else {
                // Não Logado: Esconde o KDS, mostra login
                loadingOverlay.style.display = 'none'; // Esconde o loading inicial
                kdsMainContent.style.display = 'none';
                logoutBtn.style.display = 'none';
                loginNavBtn.style.display = 'block';

                // Redireciona para login (Você precisa do login.html)
                if (window.location.pathname.endsWith('cozinha.html') || window.location.pathname.endsWith('/')) {
                     loadingMessage.textContent = "Acesso Negado. Redirecionando para login...";
                     setTimeout(() => {
                         window.location.href = 'login.html';
                     }, 1000);
                } else {
                    loadingMessage.textContent = "Faça login para continuar.";
                }
            }
        });

        logoutBtn.addEventListener('click', () => {
            if (confirm("Tem certeza que deseja sair?")) {
                signOut(auth).then(() => { 
                    // onAuthStateChanged cuidará do redirecionamento
                }).catch(e => {
                    alert("Erro ao sair.");
                });
            }
        });

        // --- LISTENER DE EVENTOS (DELEGAÇÃO) ---
        // Delegação de eventos para botões (Melhor performance)
        document.addEventListener('click', (e) => {
            const button = e.target.closest('.btn-kds');
            if (!button) return;

            const pedidoId = button.dataset.id;
            
            if (button.matches('.btn-kds.preparo') || button.matches('.btn-kds.pronto')) {
                const card = button.closest('.pedido-card');
                const novoStatus = button.dataset.status;
                const clienteNome = card.dataset.clienteNome;
                const clienteWa = card.dataset.clienteWa;
                const tipoEntrega = card.dataset.entregaTipo;

                let mensagem = "";

                if (novoStatus === 'Em Preparo') {
                    mensagem = `Olá, ${clienteNome}! 👋 Seu pedido na Dona Baguete foi confirmado e já está *em preparo*! 🍳`;
                } else if (novoStatus === 'Pronto') {
                    if (tipoEntrega === 'retirada') {
                        mensagem = `Olá, ${clienteNome}! 👋 Boas notícias! Seu pedido na Dona Baguete está *pronto para retirada*! 📍`;
                    } else {
                        mensagem = `Olá, ${clienteNome}! 👋 Boas notícias! Seu pedido na Dona Baguete está *pronto* e já está saindo para entrega! 🛵`;
                    }
                }

                if (mensagem) {
                    const notificar = confirm(`Deseja NOTIFICAR o cliente "${clienteNome}" no WhatsApp sobre essa mudança?`);
                    if (notificar) {
                        const whatsappUrl = `https://wa.me/55${clienteWa}?text=${encodeURIComponent(mensagem)}`;
                        window.open(whatsappUrl, '_blank');
                    }
                }
                moverPedido(pedidoId, novoStatus);
            }
            
            if (button.matches('.btn-kds.finalizar')) {
                finalizarPedido(pedidoId);
            }
            
            if (button.matches('.btn-kds.btn-print')) {
                handlePrint(pedidoId);
            }
        });
    </script>
</body>
</html>
