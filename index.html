<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Dona Baguete</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, #000000 0%, #1a1a2e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: linear-gradient(145deg, #2d3748, #1a202c);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #d4a021;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-container h1 {
            color: #d4a021;
            font-size: 2rem;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: bold;
        }
        .input-field {
            width: 100%;
            background: #374151;
            color: #fff;
            border: 2px solid #4b5563;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-family: inherit;
        }
        .input-field:focus {
            outline: none;
            border-color: #d4a021;
        }
        .login-btn {
            width: 100%;
            background: #d4a021;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #ffc107;
            transform: scale(1.02);
        }
        .login-btn:disabled {
            background: #4b5563;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        #error-message {
            color: #ef4444;
            font-weight: bold;
            margin-top: 20px;
            display: none; /* Começa escondido */
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>🔒 Painel Admin</h1>
        <form id="login-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="input-field" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="input-field" required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">Entrar</button>
            <p id="error-message"></p>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

        // SUA MESMA CONFIGURAÇÃO (só precisa ser declarada)
        const firebaseConfig = {
            apiKey: "AIzaSyAQTm3cL26REQloN8AFP28gwsIUzYz73og",
            authDomain: "dona-baguete-kds.firebaseapp.com",
            databaseURL: "https://dona-baguete-kds-default-rtdb.firebaseio.com", 
            projectId: "dona-baguete-kds",
            storageBucket: "dona-baguete-kds.firebasestorage.app",
            messagingSenderId: "307283406823",
            appId: "1:307283406823:web:a7d1761f0b4550cae59742",
            measurementId: "G-NY4NTLFLCG"
        };
        
        // Inicializa o App e o serviço de Autenticação
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMessage = document.getElementById('error-message');

        // VERIFICAR SE O USUÁRIO JÁ ESTÁ LOGADO
        // Se já estiver, manda direto para a cozinha (não precisa logar de novo)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuário está logado, redireciona para a cozinha
                window.location.href = 'cozinha.html';
            }
        });

        // QUANDO O FORMULÁRIO FOR ENVIADO
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Impede o recarregamento da página
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Verificando...';
            errorMessage.style.display = 'none';

            // Função do Firebase para tentar fazer o login
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // SUCESSO!
                    // O 'onAuthStateChanged' acima vai detectar o login e redirecionar
                    // Não precisamos fazer nada aqui
                })
                .catch((error) => {
                    // FALHA!
                    console.error(error.code, error.message);
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        errorMessage.textContent = 'Email ou senha incorretos.';
                    } else {
                        errorMessage.textContent = 'Ocorreu um erro. Tente novamente.';
                    }
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Entrar';
                });
        });
    </script>

</body>
</html>
